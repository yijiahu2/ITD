experiment_name: forest_agent_dev
run_name: dom197_segmentation_candidates

conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
conda_env: tcd
work_dir: /home/xth/tcd/test_prediction

input_image: /mnt/f/forest_agent_project/input/JX_ShanXia/DOM/dom197.TIF
output_dir: /mnt/f/forest_agent_project/outputs/JX_ShanXia/dom197_segmentation_candidates

metrics_json: /mnt/f/forest_agent_project/outputs/JX_ShanXia/dom197_segmentation_candidates/metrics.json
details_csv: /mnt/f/forest_agent_project/outputs/JX_ShanXia/dom197_segmentation_candidates/details.csv

xiaoban_shp: /mnt/f/forest_agent_project/input/JX_ShanXia/SHP/xiaoban29pro.shp
xiaoban_id_field: "XBH"
tree_count_field: "LMSL"
crown_field: "PJGF"
closure_field: "YBD"
area_ha_field: "MJ_hm2"

flat_slope_threshold_deg: 5.0
plain_relief_threshold_m: 30.0

terrain_landform_field: landform_type
terrain_slope_class_field: slope_class
terrain_aspect_class_field: aspect_class
terrain_slope_position_field: slope_position_class

semantic_prior_script: /home/xth/forest_agent_project/runtime_entrypoints/semantic_prior_segformer.py
semantic_prior_ckpt:

segmentation_script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py

# 如果 agent 只输出算法名，主流程会从 segmentation_candidate_cfgs 中自动取对应配置。
# 目前可选：
# - mmdet_cascade_mask_rcnn
# - mmdet_htc
# - mmdet_htc_cb_swin_l_maskiou
# - mmdet_mask_scoring_rcnn
# - mmdet_mask2former
# - maskdino_official
segmentation_algorithm: mmdet_cascade_mask_rcnn
segmentation_algorithm_cfg: {}
segmentation_candidate_cfgs:
  mmdet_cascade_mask_rcnn:
    conda_env: mmdetection
    repo_root: /home/xth/mmdetection331
    cwd: /home/xth/mmdetection331
    config_file: /home/xth/mmdetection331/configs/cascade_rcnn/cascade-mask-rcnn_r50_fpn_1x_coco.py
    checkpoint: /home/xth/mmdetection331/checkpoints/cascade_mask_rcnn_r50_fpn_1x_coco_20200203-9d4dcb24.pth
    driver_module: ITD_agent.segmentation.model_registry.adapters.mmdet_instance_adapter
    device: cuda:0
    score_thr: 0.2
    min_area_px: 50
    min_sem_overlap_ratio: 0.01
    clip_to_msem: true
    required_outputs: ["y_inst_shp"]
  mmdet_htc:
    conda_env: mmdetection
    repo_root: /home/xth/mmdetection331
    cwd: /home/xth/mmdetection331
    config_file: /home/xth/mmdetection331/configs/htc/htc-without-semantic_r50_fpn_1x_coco.py
    checkpoint: /home/xth/mmdetection331/checkpoints/htc_r50_fpn_1x_coco_20200317-7332cf16.pth
    driver_module: ITD_agent.segmentation.model_registry.adapters.mmdet_instance_adapter
    device: cuda:0
    score_thr: 0.2
    min_area_px: 50
    min_sem_overlap_ratio: 0.01
    clip_to_msem: true
    required_outputs: ["y_inst_shp"]
  mmdet_mask_scoring_rcnn:
    conda_env: mmdetection
    repo_root: /home/xth/mmdetection331
    cwd: /home/xth/mmdetection331
    config_file: /home/xth/mmdetection331/configs/ms_rcnn/ms-rcnn_r50-caffe_fpn_1x_coco.py
    checkpoint: https://download.openmmlab.com/mmdetection/v2.0/ms_rcnn/ms_rcnn_r50_caffe_fpn_1x_coco/ms_rcnn_r50_caffe_fpn_1x_coco_20200702_180848-61c9355e.pth
    driver_module: ITD_agent.segmentation.model_registry.adapters.mmdet_instance_adapter
    device: cuda:0
    score_thr: 0.2
    min_area_px: 50
    min_sem_overlap_ratio: 0.01
    clip_to_msem: true
    required_outputs: ["y_inst_shp"]
  mmdet_mask2former:
    conda_env: mmdetection
    repo_root: /home/xth/mmdetection331
    cwd: /home/xth/mmdetection331
    config_file: /home/xth/mmdetection331/configs/mask2former/mask2former_r50_8xb2-lsj-50e_coco.py
    checkpoint: https://download.openmmlab.com/mmdetection/v3.0/mask2former/mask2former_r50_8xb2-lsj-50e_coco/mask2former_r50_8xb2-lsj-50e_coco_20220506_191028-41b088b6.pth
    driver_module: ITD_agent.segmentation.model_registry.adapters.mmdet_instance_adapter
    device: cuda:0
    score_thr: 0.2
    min_area_px: 50
    min_sem_overlap_ratio: 0.01
    clip_to_msem: true
    tile_size: 1024
    tile_overlap: 128
    tile_batch_size: 1
    merge_iou_thr: 0.4
    required_outputs: ["y_inst_shp"]
  maskdino_official:
    conda_env: maskdino
    repo_root: /home/xth/MaskDINO
    cwd: /home/xth/MaskDINO
    config_file: /home/xth/MaskDINO/configs/coco/instance-segmentation/maskdino_R50_bs16_50ep_3s_dowsample1_2048.yaml
    checkpoint: /home/xth/MaskDINO/weights/maskdino_r50.pth
    driver_module: ITD_agent.segmentation.model_registry.adapters.maskdino_instance_adapter
    device: cuda
    score_thr: 0.2
    min_area_px: 50
    min_sem_overlap_ratio: 0.01
    clip_to_msem: true
    required_outputs: ["y_inst_shp"]

diam_list: "128,192,320"
tile: 2048
overlap: 512
tile_overlap: 0.35
bsize: 256
augment: false
iou_merge_thr: 0.28
