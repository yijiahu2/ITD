runtime:
  experiment_name: forest_agent_dev
  run_name: dom_dem_minimal_example
  conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
  conda_env: tcd
  work_dir: /home/xth/tcd/test_prediction

inputs:
  remote_sensing:
    images:
      - id: dom_rgb
        path: /abs/path/dom.tif
        sensor: aerial_rgb
        resolution_m: 0.1
        crs: EPSG:4547
        bands: [R, G, B]
        required: true
  terrain:
    dem:
      - id: scene_dem
        path: /abs/path/dem.tif
        resolution_m: 12.5
        crs: EPSG:4547
        vertical_unit: m
        required: true
  public_datasets:
    datasets: []
  industry_vectors:
    vectors: []
  survey_data:
    tables: []

ITD_agent:
  data_processing:
    semantic_prior:
      script: /home/xth/forest_agent_project/runtime_entrypoints/semantic_prior_segformer.py
  segmentation_models:
    main_model:
      name: legacy_cellpose_sam
      script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py

segmentation:
  diam_list: "160,256,384"
  tile: 2048
  overlap: 256
  tile_overlap: 0.35
  bsize: 256
  augment: true
  iou_merge_thr: 0.28

outputs:
  root_base_dir: /tmp/itd_agent_outputs
  cleanup_policy: minimal
