pipeline:
  mode: single
  auto_spatial_context: true
  resume: false

runtime:
  experiment_name: forest_agent_mainline_a
  run_name: dom177_dom_only_mainline_a_20260513
  mainline_profile: A_DOM_ONLY
  conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
  conda_env: tcd
  work_dir: /home/xth/tcd/test_prediction

inputs:
  remote_sensing:
    images:
      - id: dom177_rgb
        path: /mnt/f/forest_agent_project/input/JX_ShanXia/DOM/dom177.TIF
        sensor: aerial_rgb
        resolution_m: 0.1
        crs: EPSG:4547
        bands: [R, G, B]
        required: true
  terrain:
    dem: []
  canopy:
    chm: []
  surface:
    dsm: []
  industry_vectors:
    vectors: []
  survey_data:
    tables: []
  domain_knowledge:
    items: []
  public_datasets:
    datasets:
      - id: dataset4_local_train
        format: coco
        image_root: /home/xth/forest_agent_project/data/Dataset_4/Dataset_4_train/images
        annotation_path: /home/xth/forest_agent_project/data/Dataset_4/Dataset_4_train/annotation/Dataset_4_train.json
        required: false
        target_models: [main_model]
        dataset_name: Dataset_4
        forest_type: subtropical_evergreen_broadleaf_forest
        label_quality: high

ITD_agent:
  llm_gateway:
    provider: doubao
    enabled: true
  runtime_cache_worker:
    enabled: true
  planning:
    config_templates:
      runtime_template: /home/xth/forest_agent_project/configs/templates/runtime/runtime_dom177_baseline.yaml
    adaptive_generation:
      enabled: true
      use_llm: true
      parameter_search:
        enabled: true
        max_candidates: 3
        max_pilots: 2
        pilot_window_px: 1024
    roi_extraction:
      enabled: true
      use_llm: true
      max_rounds: 1
      top_k: 2
      min_problem_cases: 1
      buffer_m: 5.0
      strategy_mode: auto
    grouped_inference:
      enabled: false
      use_llm: false
      buffer_m: 5.0
  data_processing:
    image_policy:
      max_direct_pixels: 30000000
      max_direct_area_ha: 25.0
    semantic_prior:
      script: /home/xth/forest_agent_project/runtime_entrypoints/semantic_prior_segformer.py
  segmentation_models:
    main_model:
      name: legacy_cellpose_sam
      script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
    expert_models:
      - name: dense_canopy_template
        template_profile: true
        script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
        description: Dense-canopy template for DOM-only crown adhesion cases.
        scene_tags: [dense_mixed, dense_forest]
        failure_categories: [dense_canopy_adhesion, count_underestimate, crown_overlap_conflict]
        target_error_patterns: [count_under, crown, closure_low]
        routing_priority: 60
        runtime_overrides:
          diam_list: "128"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.24
  memory:
    enabled: true
  finetune_pool:
    enabled: true

segmentation:
  diam_list: "160"
  tile: 2304
  overlap: 256
  tile_overlap: 0.2
  bsize: 256
  augment: false
  iou_merge_thr: 0.24

evaluation:
  analysis:
    online_quality:
      min_area_m2: 1.0
      max_area_m2: 200.0
      min_confidence: 0.0
  final_report:
    preferred_mode: auto

outputs:
  root_base_dir: /home/xth/forest_agent_project/outputs/JX_ShanXia
  cleanup_policy: standard
  temp_runtime:
    enabled: true
    root_dir: /tmp/itd_agent_runtime
    cleanup_after_run: true
