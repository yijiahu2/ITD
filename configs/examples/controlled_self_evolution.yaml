closed_loop:
  output_dir: outputs/controlled_self_evolution
  review_after_run: true
  train_after_review: false
  promote_model_to_active: false
  activate_skill_policy: false

run_config: configs/examples/itd_agent_dom_only_mainline_a.yaml
review_config: configs/examples/itd_agent_finetune_pool_review_coco.yaml
training_config: configs/examples/itd_agent_controlled_training_coco.yaml

learning_gate:
  enabled: true
  min_score_delta_for_success_memory: 0.03
  min_repeat_count_for_failure_pattern: 2
  allow_write_memory: true
  allow_write_skill_draft: true
  allow_write_finetune_pool: true
  allow_active_skill_policy: false

skill_review:
  repeated_failure:
    enabled: true
    min_support_count: 3
  periodic_nudge:
    enabled: true
    every_n_trajectories: 10
  expert_success:
    enabled: true
    min_support_count: 2
    min_score_improvement: 0.03
  fusion_guard:
    enabled: true
    min_rejected_refinement_count: 2

training:
  data_synthesis:
    enabled: true
    max_synthetic_ratio: 0.3

guardrails:
  allow_training_trigger: false
  allow_weight_update: false
  allow_model_promotion: false
  allow_active_skill_policy: false
  allow_routing_policy_update: false
