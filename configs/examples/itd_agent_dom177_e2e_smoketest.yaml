pipeline:
  mode: single
  auto_spatial_context: true
  resume: false
  finetune_config: /home/xth/forest_agent_project/configs/templates/finetune/finetune_dom177_data_processing.yaml

runtime:
  experiment_name: forest_agent_dev
  run_name: dom177_e2e_smoketest
  conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
  conda_env: tcd
  work_dir: /home/xth/tcd/test_prediction
  xiaoban_id_field: XBH
  tree_count_field: LMSL
  crown_field: PJGF
  closure_field: YBD
  area_ha_field: MJ_hm2

inputs:
  remote_sensing:
    images:
      - id: dom177_rgb
        path: /mnt/f/forest_agent_project/input/JX_ShanXia/DOM/dom177.TIF
        sensor: aerial_rgb
        resolution_m: 0.1
        crs: EPSG:4547
        bands: [R, G, B]
        required: true
  terrain:
    dem:
      - id: shanxia_dem
        path: /mnt/f/forest_agent_project/input/JX_ShanXia/DEM/shanxia_DEM1m.tif
        resolution_m: 1.0
        crs: EPSG:4547
        vertical_unit: m
  survey_data:
    tables: []
  industry_vectors:
    vectors:
      - id: xiaoban_inventory
        path: /mnt/f/forest_agent_project/input/JX_ShanXia/SHP/xiaoban29pro.shp
        geometry_type: polygon
        crs: EPSG:4547
        key_fields: [XBH]
        field_mapping:
          xiaoban_id: XBH
          tree_count: LMSL
          crown_width: PJGF
          closure: YBD
          area_ha: MJ_hm2
        required: true
  domain_knowledge:
    items: []
  public_datasets:
    datasets: []

ITD_agent:
  llm_gateway:
    provider: doubao
    enabled: true
  planning:
    config_templates:
      runtime_template: /home/xth/forest_agent_project/configs/templates/runtime/runtime_dom177_baseline.yaml
    adaptive_generation:
      enabled: true
      use_llm: false
    roi_extraction:
      enabled: true
      use_llm: true
      max_rounds: 1
      top_k: 2
      min_problem_cases: 1
      buffer_m: 5.0
      strategy_mode: auto
      tree_count_error_ratio_thr: 0.0
      mean_crown_width_error_ratio_thr: 0.0
      closure_error_abs_thr: 0.0
      improvement_epsilon: 999.0
    grouped_inference:
      enabled: false
      use_llm: false
      buffer_m: 5.0
  data_processing:
    image_policy:
      max_direct_pixels: 30000000
      max_direct_area_ha: 25.0
    semantic_prior:
      script: /home/xth/forest_agent_project/runtime_entrypoints/semantic_prior_segformer.py
  segmentation_models:
    main_model:
      name: legacy_cellpose_sam
      script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
    child_models:
      - name: dense_canopy_template
        template_profile: true
        script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
        description: 面向密闭林冠、粘连严重 ROI 的子模型模板。
        scene_tags: [dense_mixed, dense_forest]
        terrain_tags: [gentle, moderate, hill_middle]
        failure_categories: [dense_canopy_adhesion, count_underestimate, crown_overlap_conflict]
        target_error_patterns: [count_under, crown, closure_low]
        routing_priority: 60
        runtime_overrides:
          diam_list: "128"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.24
      - name: steep_slope_template
        template_profile: true
        script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
        description: 面向陡坡和高起伏地形 ROI 的子模型模板。
        scene_tags: [dense_mixed, mountain, hill]
        terrain_tags: [steep, ridge, valley, mountain_middle, mountain_low, hill_high]
        failure_categories: [terrain_shadow_confused, count_underestimate]
        target_error_patterns: [count_under, closure_low, density_low]
        routing_priority: 70
        runtime_overrides:
          diam_list: "160"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.22
      - name: north_shade_template
        template_profile: true
        script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
        description: 面向阴坡阴影和闭合度恢复 ROI 的子模型模板。
        scene_tags: [dense_mixed, shadow]
        terrain_tags: [north, northeast, northwest, shadow, north_shade]
        failure_categories: [terrain_shadow_confused, crown_boundary_fragmented]
        target_error_patterns: [closure_low, count_under, crown]
        routing_priority: 75
        runtime_overrides:
          diam_list: "160"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.22
      - name: large_crown_template
        template_profile: true
        script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
        description: 面向稀疏大冠幅和过分裂 ROI 的子模型模板。
        scene_tags: [sparse, open_forest]
        terrain_tags: [gentle, moderate]
        failure_categories: [count_overestimate, crown_boundary_fragmented]
        target_error_patterns: [count_over, crown, closure_high]
        routing_priority: 55
        runtime_overrides:
          diam_list: "224"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.24
  memory:
    enabled: true
  finetune_pool:
    enabled: true

segmentation:
  diam_list: "160"
  tile: 2304
  overlap: 256
  tile_overlap: 0.2
  bsize: 256
  augment: false
  iou_merge_thr: 0.24

evaluation:
  analysis:
    flat_slope_threshold_deg: 5.0
    plain_relief_threshold_m: 30.0
  final_report:
    preferred_mode: auto
    benchmark:
      gt_tree_crowns_shp:
      score_field:

outputs:
  root_base_dir: /home/xth/forest_agent_project/outputs/JX_ShanXia
  cleanup_policy: standard
  temp_runtime:
    enabled: true
    root_dir: /tmp/itd_agent_runtime
    cleanup_after_run: true
