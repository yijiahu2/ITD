pipeline:
  mode: single
  auto_spatial_context: true
  resume: false
  finetune_config: /home/xth/forest_agent_project/configs/templates/finetune/finetune_dom177_data_processing.yaml

runtime:
  experiment_name: forest_agent_dev
  run_name: dom177_dom_dem_chm_realrun_20260419_rerun01
  conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
  conda_env: tcd
  work_dir: /home/xth/tcd/test_prediction
  use_runtime_cache_worker: true
  xiaoban_id_field: XBH
  tree_count_field: LMSL
  crown_field: PJGF
  closure_field: YBD
  area_ha_field: MJ_hm2

inputs:
  remote_sensing:
    images:
      - id: dom177_rgb
        path: /mnt/f/forest_agent_project/input/JX_ShanXia/DOM/dom177.TIF
        sensor: aerial_rgb
        resolution_m: 0.1
        crs: EPSG:4547
        bands: [R, G, B]
        required: true
  terrain:
    dem:
      - id: shanxia_dem
        path: /mnt/f/forest_agent_project/input/JX_ShanXia/DEM/shanxia_DEM1m.tif
        resolution_m: 1.0
        crs: EPSG:4526
        vertical_unit: m
        required: true
  canopy:
    chm:
      - id: shanxia_chm
        path: /mnt/f/forest_agent_project/input/shanxia_CHM.tif
        resolution_m: 0.4143988256642457
        crs: EPSG:4526
        vertical_unit: m
        required: true
  public_datasets:
    datasets:
      - id: dataset4_local_train
        format: coco
        image_root: /home/xth/forest_agent_project/data/Dataset_4/Dataset_4_train/images
        annotation_path: /home/xth/forest_agent_project/data/Dataset_4/Dataset_4_train/annotation/Dataset_4_train.json
        required: false
        target_models: [main_model, expert_model]
        target_expert_families: [dense_adhesion, boundary_calibration, cross_domain_generalist]
        dataset_name: Dataset_4
        forest_type: subtropical_evergreen_broadleaf_forest
        terrain_tags: [gentle, moderate]
        label_quality: high
  industry_vectors:
    vectors: []
  survey_data:
    tables: []
  domain_knowledge:
    items: []

ITD_agent:
  llm_gateway:
    provider: doubao
    enabled: true
  runtime_cache_worker:
    enabled: true
  planning:
    config_templates:
      runtime_template: /home/xth/forest_agent_project/configs/templates/runtime/runtime_dom177_baseline.yaml
    adaptive_generation:
      enabled: true
      use_llm: true
      parameter_search:
        enabled: true
        max_candidates: 3
        max_pilots: 2
        pilot_window_px: 1024
    roi_extraction:
      enabled: true
      use_llm: true
      max_rounds: 1
      top_k: 2
      min_problem_cases: 1
      buffer_m: 5.0
      strategy_mode: auto
      tree_count_error_ratio_thr: 0.0
      mean_crown_width_error_ratio_thr: 0.0
      closure_error_abs_thr: 0.0
      improvement_epsilon: 0.01
      signal_support_quantile: 0.80
      signal_candidate_max_keep: 8
      signal_dynamic_min_area_floor_ratio: 0.70
      signal_dynamic_min_area_cap_m2: 450.0
      signal_same_type_merge_distance_m: 8.0
      signal_same_type_merge_distance_floor_m: 4.0
      signal_same_type_merge_distance_cap_m: 14.0
    expert_model_routing:
      family_score_scale: 100.0
      model_score_scale: 100.0
      family_weights:
        failure_categories: 0.34
        error_patterns: 0.24
        terrain_tags: 0.18
        forest_tags: 0.12
        scene_tags: 0.06
        roi_signal_tags: 0.06
      model_weights:
        failure_categories: 0.40
        error_patterns: 0.25
        terrain_tags: 0.15
        scene_tags: 0.10
        roi_signal_tags: 0.10
    grouped_inference:
      enabled: false
      use_llm: false
      buffer_m: 5.0
  data_processing:
    image_policy:
      max_direct_pixels: 30000000
      max_direct_area_ha: 25.0
    semantic_prior:
      script: /home/xth/forest_agent_project/runtime_entrypoints/semantic_prior_segformer.py
  segmentation_models:
    main_model:
      name: legacy_cellpose_sam
      script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py
    expert_models:
      - name: dense_canopy_template
        algorithm: mmdet_htc
        description: 面向密闭林冠、粘连严重 ROI 的 HTC 专家模型。
        scene_tags: [dense_mixed, dense_forest]
        terrain_tags: [gentle, moderate, hill_middle]
        failure_categories: [dense_canopy_adhesion, count_underestimate, crown_overlap_conflict]
        target_error_patterns: [count_under, crown, closure_low]
        routing_priority: 60
        algorithm_cfg:
          tile_size: 1536
          tile_overlap: 256
          tile_batch_size: 1
          merge_iou_thr: 0.35
          score_thr: 0.18
          min_area_px: 60
        runtime_overrides:
          diam_list: "128"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.24
      - name: steep_slope_template
        algorithm: mmdet_htc
        description: 面向陡坡和高起伏地形 ROI 的 HTC 专家模型。
        scene_tags: [dense_mixed, mountain, hill]
        terrain_tags: [steep, ridge, valley, mountain_middle, mountain_low, hill_high]
        failure_categories: [terrain_shadow_confused, count_underestimate]
        target_error_patterns: [count_under, closure_low, density_low]
        routing_priority: 70
        algorithm_cfg:
          tile_size: 1280
          tile_overlap: 320
          tile_batch_size: 1
          merge_iou_thr: 0.40
          score_thr: 0.16
          min_area_px: 60
        runtime_overrides:
          diam_list: "160"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.22
      - name: north_shade_template
        algorithm: mmdet_htc
        description: 面向阴坡阴影和闭合度恢复 ROI 的 HTC 专家模型。
        scene_tags: [dense_mixed, shadow]
        terrain_tags: [north, northeast, northwest, shadow, north_shade]
        failure_categories: [terrain_shadow_confused, crown_boundary_fragmented]
        target_error_patterns: [closure_low, count_under, crown]
        routing_priority: 75
        algorithm_cfg:
          tile_size: 1280
          tile_overlap: 320
          tile_batch_size: 1
          merge_iou_thr: 0.35
          score_thr: 0.14
          min_area_px: 50
        runtime_overrides:
          diam_list: "160"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.22
      - name: large_crown_template
        algorithm: mmdet_cascade_mask_rcnn
        description: 面向稀疏大冠幅和过分裂 ROI 的 Cascade 专家模型。
        scene_tags: [sparse, open_forest]
        terrain_tags: [gentle, moderate]
        failure_categories: [count_overestimate, crown_boundary_fragmented]
        target_error_patterns: [count_over, crown, closure_high]
        routing_priority: 55
        algorithm_cfg:
          tile_size: 1792
          tile_overlap: 192
          tile_batch_size: 1
          merge_iou_thr: 0.50
          score_thr: 0.28
          min_area_px: 120
        runtime_overrides:
          diam_list: "224"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.24
      - name: boundary_calibration_template
        algorithm: mmdet_mask_scoring_rcnn
        description: 面向计数已稳定但冠缘和边界质量仍不足 ROI 的边界校准专家模型。
        scene_tags: [boundary, contour, edge, dense_mixed]
        terrain_tags: [gentle, moderate]
        failure_categories: [crown_boundary_fragmented, boundary_score_mismatch, crown_overlap_conflict]
        target_error_patterns: [crown, closure_low]
        routing_priority: 80
        algorithm_cfg:
          tile_size: 1536
          tile_overlap: 256
          tile_batch_size: 1
          merge_iou_thr: 0.42
          score_thr: 0.20
          min_area_px: 80
        runtime_overrides:
          diam_list: "160,224"
          tile: 1792
          overlap: 256
          tile_overlap: 0.2
          bsize: 256
          augment: false
          iou_merge_thr: 0.35

segmentation:
  diam_list: "160"
  tile: 2304
  overlap: 256
  tile_overlap: 0.2
  bsize: 256
  augment: false
  iou_merge_thr: 0.24

evaluation:
  analysis:
    flat_slope_threshold_deg: 5.0
    plain_relief_threshold_m: 30.0
  final_report:
    preferred_mode: auto

outputs:
  root_base_dir: /home/xth/forest_agent_project/outputs/JX_ShanXia
  cleanup_policy: debug
