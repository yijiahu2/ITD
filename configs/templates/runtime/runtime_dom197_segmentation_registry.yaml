experiment_name: forest_agent_dev
run_name: dom197_segmentation_registry

conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
conda_env: tcd
work_dir: /home/xth/tcd/test_prediction

input_image: /mnt/f/forest_agent_project/input/JX_ShanXia/DOM/dom197.TIF
output_dir: /mnt/f/forest_agent_project/outputs/JX_ShanXia/dom197_segmentation_template

metrics_json: /mnt/f/forest_agent_project/outputs/JX_ShanXia/dom197_segmentation_template/metrics.json
details_csv: /mnt/f/forest_agent_project/outputs/JX_ShanXia/dom197_segmentation_template/details.csv

xiaoban_shp: /mnt/f/forest_agent_project/input/JX_ShanXia/SHP/xiaoban29pro.shp
xiaoban_id_field: "XBH"
tree_count_field: "LMSL"
crown_field: "PJGF"
closure_field: "YBD"
area_ha_field: "MJ_hm2"

flat_slope_threshold_deg: 5.0
plain_relief_threshold_m: 30.0

terrain_landform_field: landform_type
terrain_slope_class_field: slope_class
terrain_aspect_class_field: aspect_class
terrain_slope_position_field: slope_position_class

semantic_prior_script: /home/xth/forest_agent_project/runtime_entrypoints/semantic_prior_segformer.py
semantic_prior_ckpt:

# 默认主模型入口：当未切换到 registry 算法时，直接执行统一命名的主模型脚本
segmentation_script: /home/xth/forest_agent_project/runtime_entrypoints/segmentation_legacy_cellpose_sam.py

# 新框架：当 segmentation_algorithm 非空且不等于 legacy_cellpose_sam 时，
# 主流程会转到 segmentation_zoo registry。
segmentation_algorithm: template_placeholder
segmentation_algorithm_module:
segmentation_algorithm_cfg:
  checkpoint:
  device: cuda
  notes: replace_with_real_sota_algorithm_module

diam_list: "128,192,320"
tile: 2048
overlap: 512
tile_overlap: 0.35
bsize: 256
augment: false
iou_merge_thr: 0.28
