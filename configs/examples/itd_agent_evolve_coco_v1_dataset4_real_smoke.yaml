mode: supervised_coco_evolve_v1
mainline_profile: A_DOM_ONLY

input:
  dataset_root: /home/xth/forest_agent_project/data/Dataset_4
  split: validation
  max_images: 1
  split_mapping:
    validation: Validation_set
    val: Validation_set
    train: Dataset_4_train
  image_dirname: images
  annotation_dirname: annotation

runtime:
  base_config: /home/xth/forest_agent_project/configs/templates/runtime/runtime_dom197_segmentation_candidates.yaml
  prediction_score_mode: semantic_prior_mean_prob

output_dir: /home/xth/forest_agent_project/outputs/evolve_coco_v1_dataset4_real_smoke

main_model:
  model_id: legacy_cellpose_sam
  execution_mode: real
  segmentation_algorithm: legacy_cellpose_sam
  runtime_overrides:
    grouped_inference_enabled: false
    keep_debug_outputs: true
    keep_semantic_prior_artifacts: true
    augment: false
    tile: 1024
    overlap: 256
    bsize: 256

expert_models:
  execution_mode: real

model_configs:
  htc:
    segmentation_algorithm: mmdet_htc
    segmentation_algorithm_cfg:
      config_file: /home/xth/forest_agent_project/outputs/dataset4_model_sweep_fair_20260427_02/01_htc/segmentation_training/generated_configs/mmdet_htc_public_itd.py
      checkpoint: /home/xth/forest_agent_project/outputs/dataset4_model_sweep_fair_20260427_02/01_htc/segmentation_training/external_trainer/work_dir/best_coco_segm_mAP_epoch_6.pth
      score_thr: 0.2
      min_area_px: 50
      min_sem_overlap_ratio: 0.01
      clip_to_msem: true
      tile_size: 1024
      tile_overlap: 128
      tile_batch_size: 1
      merge_iou_thr: 0.4
  cascade_mask_rcnn:
    segmentation_algorithm: mmdet_cascade_mask_rcnn
    segmentation_algorithm_cfg:
      config_file: /home/xth/forest_agent_project/outputs/dataset4_model_sweep_fair_20260427_02/02_cascade_mask_rcnn/segmentation_training/generated_configs/mmdet_cascade_mask_rcnn_public_itd.py
      checkpoint: /home/xth/forest_agent_project/outputs/dataset4_model_sweep_fair_20260427_02/02_cascade_mask_rcnn/segmentation_training/external_trainer/work_dir/best_coco_segm_mAP_epoch_5.pth
      score_thr: 0.2
      min_area_px: 50
      min_sem_overlap_ratio: 0.01
      clip_to_msem: true
      tile_size: 1024
      tile_overlap: 128
      tile_batch_size: 1
      merge_iou_thr: 0.4
  mask2former:
    segmentation_algorithm: mmdet_mask2former
    segmentation_algorithm_cfg:
      config_file: /home/xth/mmdetection331/configs/mask2former/mask2former_r50_8xb2-lsj-50e_coco.py
      checkpoint: /home/xth/mmdetection331/checkpoints/mask2former_r50_8xb2-lsj-50e_coco_20220506_191028-41b088b6.pth
      score_thr: 0.2
      min_area_px: 50
      min_sem_overlap_ratio: 0.01
      clip_to_msem: true
      tile_size: 1024
      tile_overlap: 128
      tile_batch_size: 1
      merge_iou_thr: 0.4
  maskdino:
    segmentation_algorithm: maskdino_official
    segmentation_algorithm_cfg:
      config_file: /home/xth/MaskDINO/configs/coco/instance-segmentation/maskdino_R50_bs16_50ep_3s_dowsample1_2048.yaml
      checkpoint: /home/xth/MaskDINO/weights/maskdino_r50.pth
      device: cuda
      score_thr: 0.2
      min_area_px: 50
      min_sem_overlap_ratio: 0.01
      clip_to_msem: true

expert_routing_policy:
  version: v1_rule_based_dataset4_real_smoke
  expert_map:
    under_segmentation:
      primary_expert: htc
    over_segmentation:
      primary_expert: mask2former
    false_positive:
      primary_expert: cascade_mask_rcnn
    false_negative:
      primary_expert: maskdino

evaluation:
  matching:
    iou_threshold: 0.5
    weak_overlap_threshold: 0.1

adaptive_inference:
  max_main_retries: 1
  max_expert_rounds: 1
  max_next_expert_trials: 0
  min_improvement_epsilon: 0.01
  allow_llm_direct_fusion_decision: false
  allow_llm_direct_training_trigger: false

roi_policy:
  expert_tile_size_px: 1024
  fusion_buffer_px: 64
  threshold_mode: adaptive_percentile
  min_trigger_per_tile:
    min_failure_instances: 1
  severe_failure_override:
    enabled: true
    min_severity_score: 0.75
    min_single_failure_area_ratio: 0.03
    min_affected_tree_ratio: 0.15
