input_type: dom_image

runtime:
  experiment_name: forest_agent_dom_image
  run_name: dom_image_inference
  config_prepare_only: true
  conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
  conda_env: tcd
  work_dir: runtime_entrypoints

inputs:
  remote_sensing:
    images:
      - id: dom_rgb
        path: data/sample_dom/dom_image.tif
        sensor: aerial_rgb
        resolution_m: 0.1
        crs: EPSG:4547
        bands: [R, G, B]
        required: false

ITD_agent:
  llm_gateway:
    provider: doubao
    enabled: false
  planning:
    adaptive_generation:
      enabled: false
      use_llm: false
      parameter_search:
        enabled: true
        max_candidates: 3
        max_pilots: 2
        pilot_window_px: 1024
    roi_extraction:
      enabled: true
      use_llm: false
      max_rounds: 2
      top_k: 3
      min_problem_cases: 1
      buffer_m: 5.0
      strategy_mode: auto
    config_templates:
      runtime_template: configs/templates/runtime/dom_image_runtime_template.yaml
  data_processing:
    semantic_prior:
      script: runtime_entrypoints/semantic_prior_segformer.py
  segmentation_models:
    main_model:
      name: legacy_cellpose_sam
      script: runtime_entrypoints/segmentation_legacy_cellpose_sam.py

segmentation:
  diam_list: "160,256,384"
  tile: 2048
  overlap: 256
  tile_overlap: 0.35
  bsize: 256
  augment: true
  iou_merge_thr: 0.28

outputs:
  root_base_dir: outputs/examples
  cleanup_policy: minimal
