input_type: coco_dataset
experiment_name: forest_agent_coco_dataset
run_name: coco_dataset_runtime_template

conda_sh: /home/xth/anaconda3/etc/profile.d/conda.sh
conda_env: tcd
work_dir: runtime_entrypoints

input_image: data/Dataset_4/Validation_set/images/sample.tif
output_dir: outputs/runtime/coco_dataset_runtime_template
metrics_json: outputs/runtime/coco_dataset_runtime_template/evaluation_metrics.json
details_csv: outputs/runtime/coco_dataset_runtime_template/evaluation_details.csv

semantic_prior_script: runtime_entrypoints/semantic_prior_segformer.py
